spring.application.name=warehouse-backend
server.address=0.0.0.0
server.port=${APP_PORT:8000}

# Database Configuration
# Prefer APP_DB_* env vars, fallback to Spring-style vars or local dev
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${APP_DB_HOST:localhost}:${APP_DB_PORT:5433}/${APP_DB_NAME:warehouse}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${APP_DB_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${APP_DB_PASSWORD:postgres}}

# Schema Management
# Using Flyway for migrations, so Hibernate DDL should be validate or none
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Actuator Endpoints
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
